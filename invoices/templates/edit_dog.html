{% extends 'base.html' %}
{% block content %}
{% load static crispy_forms_tags %}
<div class="container mt-5">
    <h2>Edit Dog - {{ dog.name }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'invoices:dog_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
