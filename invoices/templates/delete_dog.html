{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-danger">Delete Dog - {{ dog.name }}</h2>
    <p>Are you sure you want to delete this dog? This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-danger">Delete Dog</button>
            <a href="{% url 'invoices:dog_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
