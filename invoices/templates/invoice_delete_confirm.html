{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Invoice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-transparent">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'dashboard' %}">
            <img src="{% static 'images/favicon.png' %}" alt="Logo" width="40" height="35" class="me-2">
            <span>Welcome Dan</span>
        </a>

        <!-- Navbar Toggler Button (for mobile view) -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible Menu -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'invoices:client_list' %}">Clients</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'invoices:dog_list' %}">Dogs</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'invoices:counter' %}">Counter</a></li>
            </ul>
        </div>
    </div>
</nav>
    
    <div class="container mt-5">
        <h2>Delete Invoice #{{ invoice.invoice_number }}</h2>
        <p>Are you sure you want to delete this invoice? This action cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'invoice_detail' invoice.id %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
